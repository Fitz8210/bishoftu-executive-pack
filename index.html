const enc=new TextEncoder();function b64(s){const bin=atob(s);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out}
async function key(p){const base=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(DATA.salt),iterations:DATA.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt'])}
document.getElementById('gate').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('msg'),btn=document.getElementById('btn');msg.className='msg';msg.textContent='Decrypting…';btn.disabled=true;try{const raw=b64(DATA.payload);const clear=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(DATA.iv),tagLength:128},await key(document.getElementById('pw').value),raw);document.open();document.write(new TextDecoder().decode(clear));document.close()}catch(err){msg.className='msg bad';msg.textContent='Incorrect password.';btn.disabled=false}});
</script></body></html>
